<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Recipe</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
  <header>
    <h1 id="recipe-title"></h1>
    <a href="index.html">⬅ Back</a>
  </header>

  <div id="recipe-content">
    <img id="recipe-img" src="" alt="">
    <h3>Ingredients:</h3>
    <ul id="ingredients"></ul>
    <h3>Instructions:</h3>
    <ol id="instructions"></ol>
  </div>

  <script>
    // Define actual recipes
    const recipes = {
      spaghetti_carbonara: {
        title: "Spaghetti Carbonara",
        img: "spaghetti_carbonara.jpg",
        ingredients: [
          "200g spaghetti",
          "100g pancetta",
          "2 eggs",
          "50g grated parmesan",
          "Salt & pepper"
        ],
        instructions: [
          "Cook spaghetti in salted water.",
          "Fry pancetta until crispy.",
          "Beat eggs and mix with parmesan.",
          "Drain pasta and mix with pancetta.",
          "Remove from heat and add egg-cheese mixture.",
          "Serve immediately."
        ]
      },
      lasagna: {
        title: "Lasagna",
        img: "lasagna.jpg",
        ingredients: [
          "Lasagna sheets",
          "500g minced beef",
          "2 cups tomato sauce",
          "200g mozzarella",
          "Bechamel sauce"
        ],
        instructions: [
          "Preheat oven to 180°C.",
          "Cook minced beef with tomato sauce.",
          "Layer lasagna sheets, meat, and bechamel in a dish.",
          "Top with mozzarella.",
          "Bake for 40 minutes.",
          "Let cool slightly and serve."
        ]
      }
      // Add more recipes here...
    };

    // Get recipe from URL
    const params = new URLSearchParams(window.location.search);
    const name = params.get("name");
    const recipe = recipes[name];

    if(recipe){
      document.getElementById("recipe-title").textContent = recipe.title;
      document.getElementById("recipe-img").src = recipe.img;
      document.getElementById("recipe-img").alt = recipe.title;

      const ingredientsEl = document.getElementById("ingredients");
      recipe.ingredients.forEach(i => {
        const li = document.createElement("li");
        li.textContent = i;
        ingredientsEl.appendChild(li);
      });

      const instructionsEl = document.getElementById("instructions");
      recipe.instructions.forEach(step => {
        const li = document.createElement("li");
        li.textContent = step;
        instructionsEl.appendChild(li);
      });
    } else {
      document.getElementById("recipe-content").innerHTML = "<p>Recipe not found!</p>";
    }
  </script>
</body>
</html>
