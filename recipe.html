// Get recipe name from URL
const params = new URLSearchParams(window.location.search);
const urlName = params.get("name");

// Match recipe (replace underscores with spaces to match names)
const recipe = recipesArray.find(r=>r.name.toLowerCase().replace(/ /g,"_")===urlName);

if(recipe){
  document.getElementById("recipe-title").textContent = recipe.name;
  document.getElementById("recipe-img").src = recipe.img;
  document.getElementById("recipe-img").alt = recipe.name;

  const ingredientsEl = document.getElementById("ingredients");
  recipe.ingredients.forEach(i=>{
    const li = document.createElement("li");
    li.textContent = i;
    ingredientsEl.appendChild(li);
  });

  const instructionsEl = document.getElementById("instructions");
  recipe.instructions.forEach(s=>{
    const li = document.createElement("li");
    li.textContent = s;
    instructionsEl.appendChild(li);
  });
}else{
  document.getElementById("recipe-content").innerHTML = "<p>Recipe not found!</p>";
