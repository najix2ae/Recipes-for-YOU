<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Recipe Details</title>
  <link rel="stylesheet" href="style.css">
  <style>
    body {
      font-family: 'Arial', sans-serif;
      background-color: var(--bg-color, #f9f9f9);
      color: var(--text-color, #222);
      margin: 0;
      padding: 0;
    }
    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 20px;
      background-color: var(--header-bg, #ff7f50);
      color: white;
    }
    main {
      max-width: 800px;
      margin: 20px auto;
      padding: 0 15px;
    }
    h1 {
      text-align: center;
      margin-bottom: 10px;
    }
    .recipe-img {
      width: 100%;
      max-height: 400px;
      object-fit: cover;
      border-radius: 10px;
      margin-bottom: 20px;
    }
    h2 {
      margin-top: 20px;
    }
    ul {
      margin: 10px 0 20px 20px;
    }
    .back-button {
      display: inline-block;
      margin-top: 20px;
      padding: 10px 20px;
      background-color: var(--button-bg, #ff7f50);
      color: white;
      text-decoration: none;
      border-radius: 5px;
    }
    .back-button:hover {
      background-color: var(--button-hover, #ff6333);
    }
  </style>
</head>
<body>
  <header>
    <h1>Recipe Details</h1>
  </header>
  <main id="recipe-content">
    <!-- Recipe will load here -->
  </main>
  <script src="script.js"></script>
</body>
</html>
